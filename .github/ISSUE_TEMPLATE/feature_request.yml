name: Feature request
description: Suggest a new formula, screen, or improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: For a new clinical formula, link the guideline or paper that defines it.
