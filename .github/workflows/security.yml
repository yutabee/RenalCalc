name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          checksums="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          workdir="$(mktemp -d)"
          curl -sSfL "${base}/${tarball}" -o "${workdir}/${tarball}"
          curl -sSfL "${base}/${checksums}" -o "${workdir}/${checksums}"
          # Verify the tarball's sha256 BEFORE extracting; fail closed on mismatch.
          grep " ${tarball}\$" "${workdir}/${checksums}" > "${workdir}/${tarball}.sha256"
          ( cd "${workdir}" && sha256sum -c "${tarball}.sha256" )
          tar -xz -C "${workdir}" -f "${workdir}/${tarball}" gitleaks
          sudo install "${workdir}/gitleaks" /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --redact --verbose --no-banner

  audit:
    name: Dependency audit (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # React Native's build/runtime toolchain carries transitive advisories that
      # can't be fixed without breaking the framework, so this surfaces them for
      # visibility (weekly + on PR) without blocking merges — Dependabot drives the
      # actual updates. gitleaks (above) is the blocking security gate.
      - name: Audit dependencies
        run: |
          npm audit --omit=dev --audit-level=high || true
          npm audit --json > npm-audit.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-audit
          path: npm-audit.json
          retention-days: 14
