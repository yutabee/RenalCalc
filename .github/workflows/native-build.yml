name: Native build

# Verifies the app actually compiles natively (catches things the JS test suite
# cannot, e.g. the package / bundle-identifier rename).
#
# Cost control (private repo): Android runs on ubuntu (1x) for every PR that
# touches native files. iOS runs on macOS (billed at 10x) so it is NOT automatic —
# trigger it manually with `gh workflow run native-build.yml` (or the Actions UI)
# when you need an iOS build check. If the repo becomes public, both are free and
# the iOS `if:` guard below can be relaxed to run on PRs too.

on:
  pull_request:
    paths:
      - 'android/**'
      - 'ios/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/native-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android build (assembleDebug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Gradle assembleDebug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

  ios:
    name: iOS build (no signing)
    # macOS runners bill at 10x on private repos — manual trigger only.
    if: github.event_name == 'workflow_dispatch'
    # RN 0.86 requires Xcode >= 16.1; macos-15 ships Xcode 16.x.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          cd ios
          bundle install
          bundle exec pod install

      - name: Build (iphonesimulator, signing disabled)
        run: |
          cd ios
          xcodebuild build \
            -workspace RenalCalc.xcworkspace \
            -scheme RenalCalc \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
