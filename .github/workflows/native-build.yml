name: Native build

# Verifies the app actually compiles natively (catches things the JS test suite
# cannot, e.g. the package / bundle-identifier rename).
#
# The repo is public, so GitHub-hosted runners (incl. macOS) are free — both the
# Android and iOS builds run automatically on every PR that touches native files.

on:
  pull_request:
    paths:
      - 'android/**'
      - 'ios/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/native-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android:
    name: Android build (assembleDebug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Gradle assembleDebug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

  ios:
    name: iOS build (no signing)
    # RN 0.86 requires Xcode >= 16.1; macos-15 ships Xcode 16.x.
    runs-on: macos-15
    env:
      # Fail the build if Gemfile.lock is out of date with the Gemfile.
      BUNDLE_FROZEN: 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          cd ios
          bundle install
          bundle exec pod install

      - name: Build (iphonesimulator, signing disabled)
        run: |
          cd ios
          xcodebuild build \
            -workspace RenalCalc.xcworkspace \
            -scheme RenalCalc \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
