name: Release

# Continuous Delivery: build a release Android artifact and publish a GitHub
# Release when a v* tag is pushed. `workflow_dispatch` builds the artifact only
# (no Release is created) so the pipeline can be exercised safely.
#
# Production signing is optional: set the ANDROID_KEYSTORE_BASE64,
# ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS and ANDROID_KEY_PASSWORD repo
# secrets to sign with a real upload keystore. Without them the build falls back
# to debug signing (fine for testing, NOT for store upload).
#
# iOS release/IPA requires signing certificates and a paid macOS runner, so it is
# out of scope here — add a separate signed-iOS job once certificates are available.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release
  id-token: write # mint OIDC token for build-provenance attestation
  attestations: write # write the build-provenance attestation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Android release (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure release signing (if secrets are present)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.keystore"
            {
              echo "ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_FILE=$RUNNER_TEMP/upload.keystore"
              echo "ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
              echo "ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS"
              echo "ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
            echo "::notice::Building a release APK signed with the upload keystore."
          elif [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            echo "::error::No ANDROID_KEYSTORE_BASE64 secret set on a tag build — refusing to publish a DEBUG-signed APK as a Release."
            exit 1
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — building a DEBUG-signed APK (not for store upload)."
          fi

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Generate SHA256 checksums
        run: |
          cd android/app/build/outputs/apk/release
          sha256sum *.apk > SHA256SUMS

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renalcalc-release-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/release/SHA256SUMS
          if-no-files-found: error

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: android/app/build/outputs/apk/release/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/release/SHA256SUMS
