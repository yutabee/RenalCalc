name: Release

# Continuous Delivery: build a release Android artifact and publish a GitHub
# Release when a v* tag is pushed. `workflow_dispatch` builds the artifact only
# (no Release is created) so the pipeline can be exercised safely.
#
# Production signing is optional: set the ANDROID_KEYSTORE_BASE64,
# ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS and ANDROID_KEY_PASSWORD repo
# secrets to sign with a real upload keystore. Without them the build falls back
# to debug signing (fine for testing, NOT for store upload).
#
# iOS release/IPA requires signing certificates and a paid macOS runner, so it is
# out of scope here — add a separate signed-iOS job once certificates are available.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Android release (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure release signing (if secrets are present)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.keystore"
            {
              echo "ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_FILE=$RUNNER_TEMP/upload.keystore"
              echo "ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
              echo "ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS"
              echo "ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
            echo "::notice::Building a release APK signed with the upload keystore."
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — building a DEBUG-signed APK (not for store upload)."
          fi

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: renalcalc-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/*.apk
