name: iOS deploy

# Builds, signs and uploads the iOS app to App Store Connect when a v* tag is
# pushed (or on manual dispatch). It intentionally STOPS at upload — submitting
# the build for App Review stays a manual human gate in App Store Connect.
#
# Signing is done in the cloud with an App Store Connect API key (no committed
# certificates). The first run creates a fresh distribution certificate in the
# account, so the API key needs an "App Manager" (or "Admin") role.
#
# Required repository secrets (see docs/ios-deploy.md):
#   ASC_KEY_ID     - App Store Connect API key ID
#   ASC_ISSUER_ID  - App Store Connect API issuer ID
#   ASC_KEY_P8     - contents of the AuthKey_<id>.p8 file

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    name: Build, sign & upload to App Store Connect
    # RN 0.86 requires Xcode >= 16.1; macos-15 ships Xcode 16.x.
    runs-on: macos-15
    # Gate the signing job behind a protected environment: it pauses here until a
    # required reviewer approves, even on a tag push or workflow_dispatch.
    # NOTE: for the key to also be ISOLATED (unreadable by other workflows), the
    # ASC_* secrets must be stored as `production` ENVIRONMENT secrets, not at
    # repo scope. Until that migration is done the reviewer pause is the only
    # control this gate adds. See docs/ios-deploy.md.
    environment: production
    env:
      DEVELOPMENT_TEAM: WW832FWMK6
      SCHEME: RenalCalc
      WORKSPACE: ios/RenalCalc.xcworkspace
      KEY_DIR: ${{ github.workspace }}/private_keys
      # Fail 'bundle install' if Gemfile.lock is out of date instead of silently
      # re-resolving to un-pinned gem versions (supply-chain integrity for the
      # CocoaPods/fastlane toolchain).
      BUNDLE_FROZEN: 'true'
    steps:
      - name: Verify required secrets are present
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          missing=
          [ -z "$ASC_KEY_ID" ] && missing="$missing ASC_KEY_ID"
          [ -z "$ASC_ISSUER_ID" ] && missing="$missing ASC_ISSUER_ID"
          [ -z "$ASC_KEY_P8" ] && missing="$missing ASC_KEY_P8"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secret(s):$missing — see docs/ios-deploy.md"
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: npm

      - name: Install JS dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          cd ios
          bundle install
          bundle exec pod install

      - name: Resolve version and build number
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep -m1 'MARKETING_VERSION = ' ios/RenalCalc.xcodeproj/project.pbxproj | sed -E 's/.*= ([0-9.]+);/\1/')"
          fi
          # Monotonic, always-increasing build number (UTC timestamp) so it is
          # always higher than any previously uploaded build without editing the
          # project file each release.
          BUILD="$(date -u +%Y%m%d%H%M)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION build=$BUILD"

      - name: Write App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          mkdir -p "$KEY_DIR"
          printf '%s' "$ASC_KEY_P8" > "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          # altool/notarytool also look here:
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/"

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          # Passed via env (not inlined into the script) so the tag-derived
          # version string can never be interpreted as shell.
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD: ${{ steps.ver.outputs.build }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/RenalCalc.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Automatic \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD"

      - name: Create ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>WW832FWMK6</string>
            <key>signingStyle</key><string>automatic</string>
            <key>destination</key><string>export</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RenalCalc.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD: ${{ steps.ver.outputs.build }}
        run: |
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/RenalCalc.ipa" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          echo "::notice::Uploaded $VERSION (build $BUILD). Submit for review manually in App Store Connect."

      - name: Clean up API key
        if: always()
        run: |
          rm -f "$KEY_DIR/AuthKey_"*.p8 "$HOME/.appstoreconnect/private_keys/AuthKey_"*.p8 2>/dev/null || true
